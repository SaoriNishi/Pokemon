<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ポケオリパ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;500;700;900&display=swap">
<style>
:root{
  --gold:#f0c040;--red:#e53935;--dark:#07001a;--dark2:#0f0028;
  --font-jp:'Noto Sans JP',sans-serif;
  --font-logo:'Zen Dots',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100%;background:var(--dark);font-family:var(--font-jp);overscroll-behavior:none;}
img{display:block;}
button{font-family:var(--font-jp);}

/* ========== HEADER ========== */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(90deg,#0a0022,#220055,#0a0022);border-bottom:1.5px solid rgba(240,192,64,0.4);backdrop-filter:blur(8px);}
.h-inner{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:52px;max-width:560px;margin:0 auto;}
.h-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-logo);color:var(--gold);font-size:16px;letter-spacing:1px;}
.h-ball{width:24px;height:24px;border-radius:50%;background:white;border:2px solid var(--gold);position:relative;overflow:hidden;flex-shrink:0;}
.h-ball::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:var(--red);}
.h-ball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:white;border-radius:50%;border:1.5px solid #333;z-index:2;}
.h-nav{display:flex;align-items:center;gap:8px;}
.coin-badge{background:rgba(240,192,64,0.12);border:1px solid rgba(240,192,64,0.4);border-radius:16px;padding:4px 12px;font-size:12px;color:var(--gold);display:flex;align-items:center;gap:5px;}
.coin-num{font-size:14px;font-weight:700;}
.login-btn{background:var(--gold);color:#120030;font-size:11px;font-weight:700;padding:5px 12px;border-radius:14px;border:none;cursor:pointer;}

/* ========== MAIN SCROLL ========== */
.main{max-width:560px;margin:0 auto;padding-bottom:70px;}

/* ========== BANNER ========== */
.banner{position:relative;width:100%;height:200px;overflow:hidden;}
.banner-img{width:100%;height:200px;object-fit:cover;object-position:center 20%;}
.banner-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,0,26,.05) 0%,rgba(7,0,26,.9) 100%);}
.banner-txt{position:absolute;bottom:14px;left:0;right:0;padding:0 1.2rem;}
.banner-badge{display:inline-block;background:var(--red);color:white;font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px;margin-bottom:5px;letter-spacing:1px;}
.banner-title{color:white;font-size:18px;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.8);line-height:1.3;}
.banner-sub{color:var(--gold);font-size:11px;margin-top:3px;}

/* ========== COIN ROW ========== */
.coin-row{display:flex;justify-content:center;align-items:center;gap:10px;padding:10px 1rem;}
.coin-box{background:rgba(240,192,64,0.08);border:1px solid rgba(240,192,64,0.35);border-radius:20px;padding:6px 18px;font-size:13px;color:var(--gold);display:flex;align-items:center;gap:6px;}
.coin-main{font-size:17px;font-weight:700;}
.charge-btn{background:var(--gold);color:#120030;border:none;border-radius:16px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:transform .12s;}
.charge-btn:active{transform:scale(.96);}

/* ========== SECTION TITLE ========== */
.sec-title{text-align:center;color:var(--gold);font-size:12px;font-weight:700;letter-spacing:3px;margin:1.2rem 0 .8rem;position:relative;}
.sec-title::before,.sec-title::after{content:'';position:absolute;top:50%;width:28%;height:1px;background:linear-gradient(to right,transparent,rgba(240,192,64,.4));}
.sec-title::before{left:4%;}
.sec-title::after{right:4%;background:linear-gradient(to left,transparent,rgba(240,192,64,.4));}

/* ========== ORIPA GRID ========== */
.ogrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 1rem;}
.ocard{background:rgba(255,255,255,0.03);border:1.5px solid rgba(240,192,64,0.2);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .2s;}
.ocard:hover{transform:translateY(-3px);border-color:var(--gold);}
.ocard.ft{border-color:rgba(240,192,64,.6);box-shadow:0 0 16px rgba(240,192,64,.2);}
.ocard-img{width:100%;height:108px;object-fit:cover;object-position:center 18%;}
.ocard-noimg{width:100%;height:108px;display:flex;align-items:center;justify-content:center;font-size:36px;}
.oinfo{padding:8px 10px 0;}
.oname{color:white;font-size:13px;font-weight:700;margin-bottom:4px;}
.ometa{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.oprice{color:var(--gold);font-size:15px;font-weight:700;}
.oprice span{font-size:10px;font-weight:400;color:rgba(240,192,64,.6);}
.otag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;}
.tag-h{background:var(--red);color:white;}
.tag-n{background:#2e7d32;color:white;}
.tag-s{background:#6a1fa2;color:white;}
.tag-b{background:#0277bd;color:white;}
.pull-btn{width:100%;background:linear-gradient(90deg,var(--red),#c62828);color:white;border:none;padding:8px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;border-radius:0 0 12px 12px;transition:filter .15s;}
.pull-btn:hover{filter:brightness(1.15);}
.pull-btn:active{filter:brightness(.9);}

/* ========== BOTTOM NAV ========== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,0,30,.95);border-top:1px solid rgba(240,192,64,.15);backdrop-filter:blur(10px);display:flex;justify-content:space-around;padding:6px 0 8px;z-index:100;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:rgba(255,255,255,.3);cursor:pointer;padding:4px 16px;}
.bnav-item.active{color:var(--gold);}
.bnav-icon{font-size:20px;line-height:1;}

/* ========================================================================
   GACHA SCREEN (fullscreen overlay)
   ======================================================================== */
.gacha-screen{position:fixed;inset:0;z-index:200;display:none;background:var(--dark);}
.gacha-screen.open{display:block;}

/* --- Phase wrapper --- */
.ph{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;overflow:hidden;}
.ph.on{display:flex;}

/* ---- PH1: PACK SELECT ---- */
#ph1{background:radial-gradient(ellipse at 50% 60%,#12003a 0%,#000 100%);}
.ph1-pack-name{font-family:var(--font-logo);color:var(--gold);font-size:18px;letter-spacing:3px;margin-bottom:1.5rem;text-shadow:0 0 20px rgba(240,192,64,.6);animation:fadeUp .6s ease-out both;}
.ph1-pack{position:relative;cursor:pointer;animation:packFloat 3s ease-in-out infinite,fadeUp .7s ease-out .1s both;}
@keyframes packFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.ph1-pack-box{width:170px;height:220px;border-radius:14px;border:2px solid rgba(255,255,255,.15);position:relative;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.8),0 0 50px rgba(240,192,64,.15);}
.ph1-pack-img{width:100%;height:100%;object-fit:cover;object-position:center 18%;}
.ph1-pack-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 50%,rgba(0,0,0,.08) 100%);pointer-events:none;}
.ph1-glow{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:120px;height:40px;background:rgba(240,192,64,.15);filter:blur(20px);border-radius:50%;}
.ph1-tap{color:rgba(255,255,255,.4);font-size:13px;margin-top:1.4rem;letter-spacing:1px;animation:blink 1.2s ease-in-out infinite,fadeUp .8s ease-out .2s both;}
.ph1-start-btn{background:linear-gradient(180deg,#cc2200,#880000);border:none;border-radius:6px;padding:14px 44px;cursor:pointer;margin-top:1.8rem;position:relative;overflow:hidden;animation:fadeUp .9s ease-out .3s both;}
.ph1-start-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 100%);}
.ph1-start-btn-txt{color:white;font-size:20px;font-weight:900;letter-spacing:3px;display:block;}
.ph1-start-btn-sub{color:rgba(255,255,255,.5);font-size:11px;display:block;margin-top:2px;letter-spacing:1px;}
.skip-btn{position:absolute;bottom:24px;right:16px;background:rgba(20,60,160,.85);color:white;font-size:12px;padding:6px 16px;border-radius:6px;cursor:pointer;border:none;font-family:var(--font-jp);}
.back-btn{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,.12);}

/* ---- PH2: FLASH ---- */
#ph2{background:#fff;}

/* ---- PH3: TUNNEL BLUE ---- */
#ph3{background:#000;}
.tlines{position:absolute;inset:0;}
.tline{position:absolute;top:50%;left:50%;width:1px;transform-origin:top center;background:linear-gradient(to bottom,transparent,#00ccff,#ffffff,transparent);animation:tlineGrow .6s ease-out both;}
@keyframes tlineGrow{from{height:0;opacity:0;}to{height:130vh;opacity:.7;}}
.tglow{position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(0,220,255,.95) 0%,rgba(0,100,255,.4) 40%,transparent 70%);animation:glPulse .5s ease-in-out infinite alternate;}
@keyframes glPulse{from{transform:scale(.85);opacity:.8;}to{transform:scale(1.15);opacity:1;}}
.tspark{position:absolute;border-radius:50%;background:rgba(120,220,255,.9);animation:tsparkMove linear both;}
@keyframes tsparkMove{from{opacity:1;transform:translate(0,0) scale(0);}to{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1);}}

/* SE TEXT */
.se-text{position:absolute;font-family:var(--font-logo);font-size:38px;font-weight:900;letter-spacing:4px;pointer-events:none;white-space:nowrap;animation:seIn .4s cubic-bezier(.17,.67,.35,1.4) both,seOut .3s ease-in var(--delay) both;}
@keyframes seIn{from{transform:scale(3) translateY(-10px);opacity:0;filter:blur(8px);}to{transform:scale(1) translateY(0);opacity:1;filter:blur(0);}}
@keyframes seOut{from{opacity:1;}to{opacity:0;}}

/* ---- PH4: SPEED RED ---- */
#ph4{background:#000;}
.slines{position:absolute;inset:0;}
.sline{position:absolute;top:50%;left:50%;transform-origin:0 0;height:2px;border-radius:1px;animation:slineFlash .4s ease-in both;}
@keyframes slineFlash{from{width:0;opacity:1;}to{width:220vw;opacity:0;}}
.scenter{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,50,0,.7) 0%,transparent 65%);}

/* ---- PH5: PACK REVEAL ---- */
#ph5{background:radial-gradient(ellipse at center,#1a0000,#000);}
.rbpars{position:absolute;inset:0;}
.rbpar{position:absolute;border-radius:50%;background:rgba(255,80,30,.6);animation:rbparUp linear infinite;}
@keyframes rbparUp{0%{transform:translateY(0);opacity:.8;}100%{transform:translateY(-110vh);opacity:0;}}
.big-pack-wrap{position:relative;z-index:5;text-align:center;cursor:pointer;animation:bigPackIn .7s cubic-bezier(.17,.67,.35,1.4) both;}
@keyframes bigPackIn{from{transform:scale(.1);opacity:0;}to{transform:scale(1);opacity:1;}}
.big-pack-box{width:200px;height:265px;border-radius:16px;border:3px solid rgba(255,255,255,.25);position:relative;overflow:hidden;margin:0 auto;box-shadow:0 0 80px rgba(255,100,0,.5),0 0 160px rgba(255,40,0,.2),inset 0 0 40px rgba(255,200,0,.08);}
.big-pack-img{width:100%;height:100%;object-fit:cover;object-position:center 18%;}
.big-pack-shine{position:absolute;inset:0;background:conic-gradient(transparent 0deg,rgba(255,255,255,.05) 90deg,transparent 180deg);animation:packSpin 3s linear infinite;}
@keyframes packSpin{to{transform:rotate(360deg);}}
.big-pack-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,100,0,.15) 0%,rgba(0,0,0,.2) 100%);}
.big-pack-tap{color:rgba(255,255,255,.45);font-size:13px;margin-top:1.4rem;letter-spacing:1px;animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.35;}50%{opacity:1;}}

/* ---- PH6: CARD OPEN ---- */
#ph6{background:#000;}
.open-flash{position:absolute;inset:0;background:white;animation:oflash .5s ease-out both;}
@keyframes oflash{0%{opacity:1;}100%{opacity:0;}}
.rays-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.oray{position:absolute;width:140vmax;height:2.5px;transform-origin:center;background:rgba(240,192,64,.2);animation:orayIn .5s ease-out .15s both;}
@keyframes orayIn{from{transform:rotate(var(--r)) scaleX(0);}to{transform:rotate(var(--r)) scaleX(1);}}
.sr-pars{position:absolute;inset:0;pointer-events:none;}
.srpar{position:absolute;border-radius:50%;animation:srpFall linear infinite;}
@keyframes srpFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(115vh) rotate(720deg);opacity:0;}}

/* shake */
@keyframes shake{0%,100%{transform:translateX(0);}10%{transform:translateX(-8px) rotate(-.5deg);}20%{transform:translateX(8px) rotate(.5deg);}30%{transform:translateX(-6px);}40%{transform:translateX(6px);}50%{transform:translateX(-4px);}60%{transform:translateX(4px);}70%{transform:translateX(-2px);}80%{transform:translateX(2px);}90%{transform:translateX(-1px);}}
.shaking{animation:shake .5s ease-in-out both;}

/* card */
.open-card-wrap{position:relative;z-index:10;text-align:center;}
.result-card{width:165px;height:230px;border-radius:14px;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto .8rem;position:relative;overflow:hidden;animation:cardIn .8s cubic-bezier(.17,.67,.35,1.4) .2s both;}
@keyframes cardIn{from{transform:scale(0) rotate(-12deg);opacity:0;}70%{transform:scale(1.1) rotate(3deg);}to{transform:scale(1) rotate(0);opacity:1;}}
.card-shine3{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0) 30%,rgba(255,255,255,.12) 50%,rgba(255,255,255,0) 70%);animation:shineSwipe 2s ease-in-out .8s both;}
@keyframes shineSwipe{0%{transform:translateX(-100%);}100%{transform:translateX(200%);}}
.result-em{font-size:66px;line-height:1;}
.result-nm-sm{color:white;font-size:11px;font-weight:700;margin-top:6px;text-shadow:0 1px 4px rgba(0,0,0,.8);}
@keyframes srCardGlow{0%,100%{box-shadow:0 0 20px var(--c),0 0 40px var(--c);}50%{box-shadow:0 0 50px var(--c),0 0 100px var(--c),0 0 140px rgba(255,255,180,.15);}}
.sr-card{animation:cardIn .8s cubic-bezier(.17,.67,.35,1.4) .2s both,srCardGlow 1.5s ease-in-out 1s infinite;}
.rar-txt{font-size:30px;font-weight:900;letter-spacing:4px;animation:rarIn .5s cubic-bezier(.17,.67,.35,1.4) .7s both;}
@keyframes rarIn{from{transform:scale(4);opacity:0;filter:blur(10px);}60%{transform:scale(.9);}to{transform:scale(1);opacity:1;filter:blur(0);}}
.card-nm-big{font-size:14px;margin-top:4px;animation:fadeUp .4s ease-out 1.1s both;}
.see-result-btn{margin-top:1.4rem;background:rgba(255,255,255,.08);color:white;border:1px solid rgba(255,255,255,.2);padding:11px 32px;border-radius:24px;font-size:13px;font-weight:700;cursor:pointer;animation:fadeUp .5s ease-out 1.4s both;font-family:var(--font-jp);}
.see-result-btn:hover{background:rgba(255,255,255,.14);}

/* ---- RESULT MODAL ---- */
.rmodal{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem;}
.rmodal.show{display:flex;}
.rmodal-inner{background:linear-gradient(180deg,#0f0028,#000);border:2px solid var(--gold);border-radius:18px;padding:1.5rem 1.2rem;text-align:center;width:100%;max-width:380px;}
.rm-title{color:var(--gold);font-size:14px;font-weight:700;letter-spacing:3px;margin-bottom:1rem;}
.rm-cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:1rem;}
.rmc{text-align:center;}
.rmc-box{width:62px;height:86px;border-radius:9px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:3px;}
.rmc-r{font-size:9px;font-weight:700;}
.rmc-n{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px;}
.rm-msg{color:white;font-size:14px;margin-bottom:1.2rem;font-weight:700;}
.rm-msg.sr{color:var(--gold);font-size:16px;}
.rm-again{background:linear-gradient(90deg,var(--red),#ad1457);color:white;border:none;padding:13px;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px;font-family:var(--font-jp);}
.rm-close{color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;background:none;border:none;font-family:var(--font-jp);}

/* ========= GLOBAL SHAKE ========= */
@keyframes globalShake{0%,100%{transform:translate(0,0);}15%{transform:translate(-6px,-2px);}30%{transform:translate(6px,2px);}45%{transform:translate(-4px,1px);}60%{transform:translate(4px,-1px);}75%{transform:translate(-2px,0);}90%{transform:translate(2px,0);}}
body.shaking{animation:globalShake .4s ease-in-out;}
</style>
</head>
<body>

<!-- ========== MAIN SITE ========== -->
<div id="main-site">
  <div class="header">
    <div class="h-inner">
      <div class="h-logo"><div class="h-ball"></div>ポケオリパ</div>
      <div class="h-nav">
        <div class="coin-badge">🪙<span class="coin-num" id="hpts">5,000</span>coin</div>
        <button class="login-btn">ログイン</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="banner">
      <img class="banner-img" id="bn1" alt="バナー"/>
      <div class="banner-ov"></div>
      <div class="banner-txt">
        <div class="banner-badge">🏆 プラチナランク限定</div>
        <div class="banner-title">大人気ポケモンカードを<br>ぶち抜け！</div>
        <div class="banner-sub">1/43の確率で13,000coin以上！！</div>
      </div>
    </div>

    <div class="coin-row">
      <div class="coin-box">🪙 所持コイン <span class="coin-main" id="pts">5,000</span> coin</div>
      <button class="charge-btn">チャージ</button>
    </div>

    <div class="sec-title">— ORIPA LIST —</div>
    <div class="ogrid" id="ogrid"></div>
  </div>

  <div class="bottom-nav">
    <div class="bnav-item active"><div class="bnav-icon">🏠</div>ホーム</div>
    <div class="bnav-item"><div class="bnav-icon">🎴</div>一覧</div>
    <div class="bnav-item"><div class="bnav-icon">📜</div>履歴</div>
    <div class="bnav-item"><div class="bnav-icon">👤</div>マイページ</div>
  </div>
</div>

<!-- ========== GACHA FULLSCREEN ========== -->
<div class="gacha-screen" id="gacha-screen">

  <!-- PH1: パック選択→スタート -->
  <div class="ph on" id="ph1">
    <div class="ph1-pack-name" id="ph1-name">プラチナパック</div>
    <div class="ph1-pack" onclick="startGacha()">
      <div class="ph1-pack-box">
        <img class="ph1-pack-img" id="ph1-img" alt="パック"/>
        <div class="ph1-pack-shine"></div>
      </div>
      <div class="ph1-glow"></div>
    </div>
    <div class="ph1-tap">パックをタップ</div>
    <button class="ph1-start-btn" onclick="startGacha()">
      <span class="ph1-start-btn-txt">START</span>
      <span class="ph1-start-btn-sub">タップで演出スタート</span>
    </button>
    <button class="back-btn" onclick="closeGacha()">← 戻る</button>
    <button class="skip-btn" onclick="skipToOpen()">演出をスキップする</button>
  </div>

  <!-- PH2: FLASH -->
  <div class="ph" id="ph2"></div>

  <!-- PH3: BLUE TUNNEL -->
  <div class="ph" id="ph3">
    <div class="tlines" id="tlines"></div>
    <div class="tglow"></div>
    <div id="tsparks"></div>
    <div class="skip-btn" style="position:absolute" onclick="skipToOpen()">演出をスキップする</div>
  </div>

  <!-- PH4: RED SPEED -->
  <div class="ph" id="ph4">
    <div class="slines" id="slines"></div>
    <div class="scenter"></div>
    <div class="skip-btn" style="position:absolute" onclick="skipToOpen()">演出をスキップする</div>
  </div>

  <!-- PH5: PACK REVEAL -->
  <div class="ph" id="ph5" onclick="openPackAnim()">
    <div class="rbpars" id="rbpars"></div>
    <div class="big-pack-wrap">
      <div class="big-pack-box">
        <img class="big-pack-img" id="ph5-img" alt="パック"/>
        <div class="big-pack-shine"></div>
        <div class="big-pack-overlay"></div>
      </div>
      <div class="big-pack-tap">タップでパックを開ける ✨</div>
    </div>
    <button class="skip-btn" onclick="event.stopPropagation();skipToOpen()">演出をスキップする</button>
  </div>

  <!-- PH6: CARD RESULT -->
  <div class="ph" id="ph6">
    <div class="open-flash"></div>

/* ===========================
   INIT
=========================== */
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('bn1').src = IMG1;
  document.getElementById('bn1').onerror = () => { document.getElementById('bn1').style.background='linear-gradient(135deg,#1a0035,#000)'; };
  buildGrid();
});

function buildGrid() {
  const grid = document.getElementById('ogrid');
  grid.innerHTML = '';
  PACKS.forEach(pk => {
    const d = document.createElement('div');
    d.className = 'ocard' + (pk.id===0?' ft':'');
    d.innerHTML = `<img class="ocard-img" src="${pk.img===0?IMG1:IMG2}" alt="${pk.name}" onerror="this.style.display='none'"/>
<div class="oinfo">
  <div class="oname">${pk.name}</div>
  <div class="ometa">
    <div class="oprice">${pk.cost.toLocaleString()}<span>coin</span></div>
    <div class="otag ${pk.tagc}">${pk.tag}</div>
  </div>
</div>
<button class="pull-btn" onclick="openGachaScreen(${pk.id})">▶ 引く！</button>`;
    grid.appendChild(d);
  });
}

/* ===========================
   COIN UTIL
=========================== */
function updateCoins(val) {
  coins = val;
  document.getElementById('pts').textContent = val.toLocaleString();
  document.getElementById('hpts').textContent = val.toLocaleString();
}

/* ===========================
   GACHA SCREEN OPEN/CLOSE
=========================== */
function openGachaScreen(packId) {
  curPack = PACKS[packId];
  const gs = document.getElementById('gacha-screen');
  gs.classList.add('open');
  // reset to ph1
  ph('ph1');
  document.getElementById('ph1-name').textContent = curPack.name;
  const img = curPack.img===0 ? IMG1 : IMG2;
  document.getElementById('ph1-img').src = img;
  document.getElementById('ph5-img').src = img;
}

function closeGacha() {
  document.getElementById('gacha-screen').classList.remove('open');
}

function ph(id) {
  document.querySelectorAll('.ph').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

/* ===========================
   DRAW CARDS
=========================== */
function drawCard(type) {
  const r = Math.random();
  if(type==='sr') return {...CARDS[~~(Math.random()*4)]};
  if(type==='hot') { if(r<.09)return{...CARDS[~~(Math.random()*4)]};if(r<.42)return{...CARDS[4+~~(Math.random()*3)]};return{...CARDS[7]}; }
  if(type==='pika') { if(r<.05)return{...CARDS[~~(Math.random()*4)]};if(r<.36)return{...CARDS[5]};return{...CARDS[7]}; }
  if(r<.04)return{...CARDS[~~(Math.random()*4)]};if(r<.28)return{...CARDS[4+~~(Math.random()*3)]};return{...CARDS[7]};
}

/* ===========================
   SEQUENCE
=========================== */
function startGacha() {
  const total = curPack.cost * 5;
  if(coins < total){ flashMsg('コインが足りません！チャージしてください'); return; }
  updateCoins(coins - total);
  drawn = Array.from({length:5}, () => drawCard(curPack.type));
  // SRの有無でフィーチャーカード決定
  const srs = drawn.filter(c=>c.r==='SR');
  featCard = srs.length ? srs[0] : drawn[0];

  // FLASH → TUNNEL BLUE → SPEED RED → PACK REVEAL
  ph('ph2');
  setFlash();
  setTimeout(()=>{ph('ph3');buildTunnel();}, 350);
  setTimeout(()=>showSEText('ph3','ORIPA','#00ccff', 600), 700);
  setTimeout(()=>showSEText('ph3','OPENING','#ffffff', 1000), 1100);
  setTimeout(()=>{shakePage();ph('ph4');buildSpeed();}, 2100);
  setTimeout(()=>showSEText('ph4','RUSH!!','#ff4400', 0), 2200);
  setTimeout(()=>{ph('ph5');buildRevealPars();}, 3200);
}

function setFlash() {
  const p = document.getElementById('ph2');
  p.style.background='#fff';
  setTimeout(()=>{ p.style.transition='background .35s'; p.style.background='#000'; }, 50);
  setTimeout(()=>{ p.style.transition=''; p.style.background='#fff'; }, 400); // reset for next
}

function skipToOpen() {
  if(!drawn.length){
    const total = curPack.cost * 5;
    if(coins < total){ closeGacha(); flashMsg('コインが足りません！'); return; }
    updateCoins(coins - total);
    drawn = Array.from({length:5}, () => drawCard(curPack.type));
    const srs = drawn.filter(c=>c.r==='SR');
    featCard = srs.length ? srs[0] : drawn[0];
  }
  openPackAnim();
}

function openPackAnim() {
  ph('ph6');
  showCardResult(featCard);
  buildRays(featCard.r==='SR');
  if(featCard.r==='SR'){ buildSRPars(); shakePage(); }
}

function showCardResult(card) {
  const rc = document.getElementById('result-card');
  rc.style.background = card.bg;
  rc.style.borderColor = card.bc;
  rc.style.setProperty('--c', card.bc);
  rc.className = 'result-card' + (card.r==='SR'?' sr-card':'');
  void rc.offsetWidth;
  rc.className = 'result-card' + (card.r==='SR'?' sr-card':'');
  document.getElementById('result-em').textContent = card.e;
  document.getElementById('result-nm-sm').textContent = card.n;
  const rt = document.getElementById('rar-txt');
  rt.style.color = card.tc;
  rt.textContent = card.r==='SR'?'✨ S R ✨':card.r==='R'?'★  R  ★':'Ｃ';
  const cn = document.getElementById('card-nm-big');
  cn.style.color = card.tc;
  cn.textContent = card.n;
}

/* ===========================
   SE TEXT EFFECT
=========================== */
function showSEText(phId, text, color, delay) {
  const parent = document.getElementById(phId);
  const el = document.createElement('div');
  el.className = 'se-text';
  el.textContent = text;
  el.style.color = color;
  el.style.top = (35 + Math.random()*30) + '%';
  el.style.left = '50%';
  el.style.transform = 'translateX(-50%)';
  el.style.textShadow = `0 0 20px ${color}, 0 0 40px ${color}`;
  el.style.setProperty('--delay', (delay+600)+'ms');
  el.style.zIndex = 50;
  parent.appendChild(el);
  setTimeout(()=>el.remove(), delay+1000);
}

/* ===========================
   BUILD EFFECTS
=========================== */
function buildTunnel() {
  const c = document.getElementById('tlines'); c.innerHTML='';
  for(let i=0;i<40;i++){
    const d=document.createElement('div'); d.className='tline';
    d.style.cssText=`transform:rotate(${i*9}deg);height:${70+Math.random()*90}vh;animation-delay:${Math.random()*.3}s;opacity:${.4+Math.random()*.6};`;
    c.appendChild(d);
  }
  const sp = document.getElementById('tsparks'); sp.innerHTML='';
  for(let i=0;i<50;i++){
    const d=document.createElement('div'); d.className='tspark';
    const a=Math.random()*Math.PI*2, dist=60+Math.random()*220;
    const sz=2+Math.random()*5;
    d.style.cssText=`width:${sz}px;height:${sz}px;top:${42+Math.random()*16}%;left:${42+Math.random()*16}%;--tx:${Math.cos(a)*dist}px;--ty:${Math.sin(a)*dist}px;animation-duration:${.4+Math.random()*.8}s;animation-delay:${Math.random()*.4}s;animation-fill-mode:both;position:absolute;`;
    sp.appendChild(d);
  }
}

function buildSpeed() {
  const c = document.getElementById('slines'); c.innerHTML='';
  for(let i=0;i<56;i++){
    const d=document.createElement('div'); d.className='sline';
    const angle=Math.random()*360, w=80+Math.random()*180;
    d.style.cssText=`height:${1+Math.random()*3}px;transform:rotate(${angle}deg);animation-delay:${Math.random()*.2}s;animation-duration:${.25+Math.random()*.25}s;width:${w}px;background:linear-gradient(to right,transparent,rgba(${200+~~(Math.random()*55)},${20+~~(Math.random()*40)},0,.95));`;
    c.appendChild(d);
  }
}

function buildRevealPars() {
  const c = document.getElementById('rbpars'); c.innerHTML='';
  for(let i=0;i<35;i++){
    const d=document.createElement('div'); d.className='rbpar';
    const sz=4+Math.random()*12;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${Math.random()*30}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;`;
    c.appendChild(d);
  }
}

function buildRays(isSR) {
  const c = document.getElementById('rays-wrap'); c.innerHTML='';
  const cnt=isSR?24:14, col=isSR?'rgba(240,192,64,.25)':'rgba(255,255,255,.12)';
  for(let i=0;i<cnt;i++){
    const d=document.createElement('div'); d.className='oray';
    d.style.setProperty('--r', i*(360/cnt)+'deg');
    d.style.background=col;
    c.appendChild(d);
  }
}

function buildSRPars() {
  const c = document.getElementById('sr-pars'); c.innerHTML='';
  const cols=['#f0c040','#ffeb3b','#fff','#ff9500','#ff6d00','#ffe0b2'];
  for(let i=0;i<70;i++){
    const d=document.createElement('div'); d.className='srpar';
    const sz=3+Math.random()*8;
    d.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};left:${Math.random()*100}%;top:${-8+Math.random()*12}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*2}s;`;
    c.appendChild(d);
  }
}

function shakePage() {
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  setTimeout(()=>document.body.classList.remove('shaking'), 500);
}

/* ===========================
   RESULT MODAL
=========================== */
function showRModal() {
  const cards = document.getElementById('rm-cards');
  cards.innerHTML='';
  drawn.forEach(c=>{
    const w=document.createElement('div'); w.className='rmc';
    w.innerHTML=`<div class="rmc-box" style="background:${c.bg};border-color:${c.bc};${c.r==='SR'?'box-shadow:0 0 12px '+c.bc:''}"><span style="font-size:24px">${c.e}</span></div><div class="rmc-r" style="color:${c.tc}">${c.r}</div><div class="rmc-n">${c.n.length>5?c.n.slice(0,4)+'…':c.n}</div>`;
    cards.appendChild(w);
  });
  const srs=drawn.filter(c=>c.r==='SR'), rs=drawn.filter(c=>c.r==='R');
  const m=document.getElementById('rm-msg');
  if(srs.length){m.textContent='🎉 '+srs.map(c=>c.n).join('・')+' 排出！おめでとう！';m.className='rm-msg sr';}
  else if(rs.length){m.textContent='✨ '+rs[0].n+' が出た！';m.className='rm-msg';m.style.color='#ce93d8';}
  else{m.textContent='コモンでした…次こそSRを引こう！';m.className='rm-msg';m.style.color='#555';}
  document.getElementById('rmodal').classList.add('show');
}

function closeRModal() {
  document.getElementById('rmodal').classList.remove('show');
  closeGacha();
}

function playAgain() {
  document.getElementById('rmodal').classList.remove('show');
  drawn=[];featCard=null;
  ph('ph1');
}

function flashMsg(msg){ alert(msg); }
</script>
